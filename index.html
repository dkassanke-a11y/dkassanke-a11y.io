<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HofBuch Pro Cloud v3.1</title>
    <style>
        :root { --green: #2d6a4f; --dark: #1b4332; --light: #f8f9fa; --accent: #d4a373; --red: #bc4749; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; color: #333; }
        .login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--dark); position: fixed; width: 100%; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #app { display: none; }
        .header { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .kachel { background: white; padding: 25px 15px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--green); display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--green); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--green); color: white; }
        .section { display: none; }
        .active { display: block; }
        .badge { background: var(--accent); color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-screen">
        <div class="login-box">
            <h2>🚜 HofBuch Pro</h2>
            <p>Cloud Login</p>
            <input type="text" id="l-u" placeholder="Benutzername">
            <input type="password" id="l-p" placeholder="Passwort">
            <button class="btn" id="login-btn" onclick="login()">Anmelden</button>
            <p id="msg" style="color:red; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <span onclick="go('dash')" style="cursor:pointer; font-weight:bold;">🚜 HofBuch <span id="sync-info" style="font-size:10px;"></span></span>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:4px 8px;">Logout</button>
        </div>

        <div class="container">
            <div id="dash" class="section active">
                <h2 id="welcome">Hallo!</h2>
                <div class="grid">
                    <div id="k-tasks" class="kachel" onclick="go('tasks')"><i>🛠️</i>Aufgaben</div>
                    <div id="k-orders" class="kachel" onclick="go('orders')"><i>🛒</i>Bestellung</div>
                    <div id="k-fleet" class="kachel" onclick="go('fleet')"><i>🚜</i>Fuhrpark</div>
                    <div id="k-staff" class="kachel" onclick="go('staff')"><i>👥</i>Personal</div>
                </div>
            </div>

            <div id="staff" class="section">
                <button onclick="go('dash')">← Zurück</button>
                <div class="card">
                    <h3>Mitarbeiter anlegen</h3>
                    <input type="text" id="n-u" placeholder="Name">
                    <input type="password" id="n-p" placeholder="Passwort">
                    <input type="text" id="n-g" placeholder="Gruppe (z.B. Ernte)">
                    <div style="background:#eee; padding:10px; border-radius:8px; margin:10px 0;">
                        <label><input type="checkbox" id="p-tasks" checked> Aufgaben</label><br>
                        <label><input type="checkbox" id="p-orders" checked> Bestellung</label><br>
                        <label><input type="checkbox" id="p-fleet"> Fuhrpark</label><br>
                        <label><input type="checkbox" id="p-admin"> Admin</label>
                    </div>
                    <button class="btn" onclick="addUser()">Speichern</button>
                </div>
                <div id="staff-list"></div>
            </div>

            <div id="tasks" class="section">
                <button onclick="go('dash')">← Zurück</button>
                <div class="card" id="task-input-area" style="display:none;">
                    <input type="text" id="t-m" placeholder="Maschine">
                    <input type="text" id="t-d" placeholder="Aufgabe">
                    <input type="text" id="t-g" placeholder="Gruppe">
                    <button class="btn" onclick="addTask()">Zuweisen</button>
                </div>
                <div id="task-list"></div>
            </div>

            <div id="orders" class="section">
                <button onclick="go('dash')">← Zurück</button>
                <div class="card"><input type="text" id="o-i" placeholder="Bedarf"><button class="btn" onclick="addOrder()">Melden</button></div>
                <div id="order-list"></div>
            </div>

            <div id="fleet" class="section">
                <button onclick="go('dash')">← Zurück</button>
                <div class="card" id="fleet-admin-input" style="display:none;">
                    <input type="text" id="f-name" placeholder="Maschine">
                    <input type="text" id="f-hours" placeholder="Betriebsstunden">
                    <textarea id="f-plan" placeholder="Wartungsplan"></textarea>
                    <button class="btn" onclick="addFleetMachine()">Hinzufügen</button>
                </div>
                <div id="fleet-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/ee2e847bca4c396d9025";
        // Standard-Daten falls Cloud leer ist
        let db = { users: [], tasks: [], orders: [], fleet: [] };
        let currentUser = null;

        async function sync(save = false) {
            const info = document.getElementById('sync-info');
            info.innerText = "☁️...";
            try {
                if(save) {
                    await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(db) });
                } else {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    if(data && typeof data === 'object') db = data;
                }
                info.innerText = "✅";
                render();
            } catch (e) { 
                info.innerText = "⚠️ Offline"; 
                console.log("Sync-Fehler:", e);
            }
        }

        async function login() {
            const u = document.getElementById('l-u').value;
            const p = document.getElementById('l-p').value;
            const msg = document.getElementById('msg');
            msg.innerText = "Lade Cloud...";

            await sync(); // Versuche Cloud zu laden

            // NOTFALL-LOGIN & NORMALER LOGIN
            let user = null;
            if(u === "admin" && p === "hof2026") {
                user = { u: "Master-Admin", g: "Admin", perms: ['tasks','orders','fleet','admin'] };
            } else if (db.users) {
                user = db.users.find(x => x.u === u && x.p === p);
            }

            if(user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('app').style.display = "block";
                document.getElementById('welcome').innerText = "Hallo " + user.u + "!";
                applyPermissions(user);
            } else {
                msg.innerText = "Login falsch!";
            }
        }

        function applyPermissions(user) {
            const p = user.perms || [];
