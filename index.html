<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HofBuch OS - LS25 Cloud Edition</title>
    <style>
        :root { 
            --ls-bg: #0a0b0d; --ls-card: #16191f; --ls-green: #5eb82d; 
            --ls-accent: #fbc02d; --text: #ffffff; --text-dim: #8a8d91;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--ls-bg); margin: 0; color: var(--text); overflow-x: hidden; }
        
        /* LOGIN */
        .login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1c1f26, #0a0b0d); position: fixed; width:100%; z-index:2000; }
        .login-box { background: var(--ls-card); padding: 40px; border-radius: 4px; width: 300px; text-align: center; border-bottom: 4px solid var(--ls-green); }
        
        /* HEADER */
        header { background: #000; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--ls-green); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .ls-card { background: var(--ls-card); border: 1px solid #2a2e38; transition: 0.2s; position: relative; }
        .ls-card:hover { border-color: var(--ls-green); }
        .ls-img-box { width: 100%; height: 200px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .ls-img { width: 100%; height: 100%; object-fit: contain; }
        .ls-content { padding: 20px; }
        .ls-brand { color: var(--ls-green); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .ls-title { font-size: 1.4rem; font-weight: 900; font-style: italic; text-transform: uppercase; margin-bottom: 15px; }
        
        .ls-stats { background: #0a0b0d; padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; border-radius: 2px; }
        .stat-label { color: var(--text-dim); }

        /* DASHBOARD */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .kachel { background: var(--ls-card); padding: 35px 10px; text-align: center; cursor: pointer; border: 1px solid #2a2e38; font-weight: bold; transition: 0.2s; }
        .kachel:hover { background: var(--ls-green); color: #000; transform: scale(1.02); }
        .kachel i { font-size: 40px; display: block; margin-bottom: 15px; font-style: normal; }

        /* UI ELEMENTS */
        input, textarea { background: #1c1f26; border: 1px solid #333; color: white; padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: var(--ls-green); outline: none; }
        .btn { background: var(--ls-green); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 15px; }
        .btn-sm { padding: 8px 15px; font-size: 12px; width: auto; background: #2a2e38; color: white; border: none; cursor: pointer; margin-right: 5px; }
        .btn-sm:hover { background: var(--ls-green); color: #000; }
        
        .section { display: none; }
        .active { display: block; }
        .admin-panel { border: 1px solid var(--ls-accent); padding: 20px; margin-bottom: 30px; background: rgba(251, 192, 45, 0.03); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-screen">
        <div class="login-box">
            <h1 style="color: var(--ls-green); font-style: italic; margin:0; font-size: 2.5rem;">HOFBUCH</h1>
            <p style="color: var(--text-dim); font-size: 10px; letter-spacing: 4px; margin-bottom: 30px;">SYSTEM 2026 ONLINE</p>
            <input type="text" id="l-u" placeholder="BENUTZERNAME">
            <input type="password" id="l-p" placeholder="PASSWORT">
            <button class="btn" onclick="performLogin()">SYSTEM STARTEN</button>
            <p id="msg" style="color:var(--ls-accent); font-size: 11px; margin-top: 15px;"></p>
        </div>
    </div>
