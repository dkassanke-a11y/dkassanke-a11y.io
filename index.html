<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HofBuch Pro Cloud</title>
    <style>
        :root { --green: #2d6a4f; --dark: #1b4332; --light: #f8f9fa; --accent: #d4a373; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; color: #333; }
        
        /* UI ELEMENTE */
        .login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--dark); position: fixed; width: 100%; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        #app { display: none; }
        .header { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* DASHBOARD */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .kachel { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid var(--green); display: none; }
        
        /* FORMULARE */
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
        .perm-box { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--green); color: white; }
        
        .section { display: none; }
        .active { display: block; }
        .badge { background: #eee; padding: 3px 7px; border-radius: 4px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-screen">
        <div class="login-box">
            <h2>🚜 HofBuch Login</h2>
            <input type="text" id="l-u" placeholder="Name">
            <input type="password" id="l-p" placeholder="Passwort">
            <button class="btn" onclick="login()">Anmelden</button>
            <p id="msg" style="color:red;"></p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <b onclick="go('dash')">🚜 HofBuch <span id="sync-info" style="font-weight:normal; font-size:10px;"></span></b>
            <button onclick="location.reload()" style="color:white; background:none; border:1px solid white; border-radius:4px;">Logout</button>
        </div>

        <div class="container">
            <div id="dash" class="section active">
                <h2 id="welcome">Hallo!</h2>
                <div class="grid">
                    <div id="k-tasks" class="kachel" onclick="go('tasks')"><i>🛠️</i><br>Aufgaben</div>
                    <div id="k-orders" class="kachel" onclick="go('orders')"><i>🛒</i><br>Bestellung</div>
                    <div id="k-fleet" class="kachel" onclick="go('fleet')"><i>🚜</i><br>Fuhrpark</div>
                    <div id="k-staff" class="kachel" onclick="go('staff')"><i>👥</i><br>Personal</div>
                </div>
            </div>

            <div id="staff" class="section">
                <button onclick="go('dash')" style="margin-bottom:10px;">← Zurück</button>
                <div class="card">
                    <h3>👤 Mitarbeiter & Rechte</h3>
                    <input type="text" id="n-u" placeholder="Name">
                    <input type="password" id="n-p" placeholder="Passwort">
                    <input type="text" id="n-g" placeholder="Gruppe (z.B. Ernte)">
                    
                    <p style="font-size:12px; margin-bottom:5px;"><b>Berechtigungen:</b></p>
                    <div class="perm-box">
                        <label><input type="checkbox" id="p-tasks"> Aufgaben</label>
                        <label><input type="checkbox" id="p-orders"> Bestellungen</label>
                        <label><input type="checkbox" id="p-fleet"> Fuhrpark</label>
                        <label><input type="checkbox" id="p-admin"> Admin-Rechte</label>
                    </div>
                    <button class="btn" onclick="addUser()">Nutzer erstellen</button>
                </div>
                <div id="staff-list"></div>
            </div>

            <div id="tasks" class="section">
                <button onclick="go('dash')" style="margin-bottom:10px;">← Zurück</button>
                <div class="card" id="admin-task-input" style="display:none;">
                    <h3>🛠️ Neue Aufgabe</h3>
                    <input type="text" id="t-m" placeholder="Maschine">
                    <input type="text" id="t-d" placeholder="Was ist zu tun?">
                    <input type="text" id="t-g" placeholder="Für Gruppe (leer lassen = für alle)">
                    <button class="btn" onclick="addTask()">Zuweisen</button>
                </div>
                <div id="task-list"></div>
            </div>

            <div id="orders" class="section">
                <button onclick="go('dash')">← Zurück</button>
                <div class="card"><h3>🛒 Bestellliste</h3><input type="text" id="o-i" placeholder="Teil anfordern"><button class="btn" onclick="addOrder()">Eintragen</button><div id="order-list"></div></div>
            </div>
            <div id="fleet" class="section"><button onclick="go('dash')">← Zurück</button><h3>🚜 Fuhrpark</h3><div id="fleet-list"></div></div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.npoint.io/ee2e847bca4c396d9025";
        let db = { users: [], tasks: [], orders: [], fleet: [] };
        let currentUser = null;

        async function sync(save = false) {
            document.getElementById('sync-info').innerText = "☁️...";
            if(save) {
                await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(db) });
            } else {
                const res = await fetch(API_URL);
                db = await res.json();
            }
            document.getElementById('sync-info').innerText = "✅";
            render();
        }

        async function login() {
            const u = document.getElementById('l-u').value;
            const p = document.getElementById('l-p').value;
            await sync();

            let user = (u === "admin" && p === "hof2026") ? {u:"admin", r:"admin", perms:['tasks','orders','fleet','admin']} : db.users.find(x => x.u === u && x.p === p);

            if(user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('app').style.display = "block";
                setupDashboard(user);
            } else { alert("Login falsch!"); }
        }

        function setupDashboard(user) {
            // Zeige Kacheln basierend auf Rechten
            if(user.perms.includes('tasks')) document.getElementById('k-tasks').style.display = "block";
            if(user.perms.includes('orders')) document.getElementById('k-orders').style.display = "block";
            if(user.perms.includes('fleet')) document.getElementById('k-fleet').style.display = "block";
            if(user.perms.includes('admin')) {
                document.getElementById('k-staff').style.display = "block";
                document.getElementById('admin-task-input').style.display = "block";
            }
        }

        function go(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            sync();
        }

        function addUser() {
            const perms = [];
            if(document.getElementById('p-tasks').checked) perms.push('tasks');
            if(document.getElementById('p-orders').checked) perms.push('orders');
            if(document.getElementById('p-fleet').checked) perms.push('fleet');
            if(document.getElementById('p-admin').checked) perms.push('admin');

            db.users.push({
                u: document.getElementById('n-u').value,
                p: document.getElementById('n-p').value,
                g: document.getElementById('n-g').value || "Allgemein",
                perms: perms
            });
            sync(true);
        }

        function addTask() {
            db.tasks.push({ v: document.getElementById('t-m').value, d: document.getElementById('t-d').value, g: document.getElementById('t-g').value });
            sync(true);
        }

        function addOrder() {
            db.orders.push({ i: document.getElementById('o-i').value, u: currentUser.u });
            sync(true);
        }

        function render() {
            // Aufgaben Filterung: Zeige nur Aufgaben für die eigene Gruppe oder "alle"
            const tl = document.getElementById('task-list');
            tl.innerHTML = "";
            db.tasks.filter(t => !t.g || t.g === currentUser.g || currentUser.perms.includes('admin')).forEach((t, i) => {
                tl.innerHTML += `<div class="card"><b>${t.v}</b>: ${t.d} <span class="badge">${t.g || 'Alle'}</span><br>
