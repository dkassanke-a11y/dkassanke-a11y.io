<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HofBuch Cloud Live</title>
    <style>
        :root { --green: #2d6a4f; --dark: #1b4332; --light: #f4f7f6; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; }
        .login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--dark); }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-p { background: var(--green); color: white; }
        #app { display: none; }
        .header { background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .card { background: white; padding: 15px; margin: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .admin-only { display: none; }
        .loader { font-size: 12px; color: orange; display: none; }
    </style>
</head>
<body>

    <div id="login-overlay" class="login-screen">
        <div class="login-box">
            <h2>🚜 HofBuch Login</h2>
            <input type="text" id="l-u" placeholder="Name">
            <input type="password" id="l-p" placeholder="Passwort">
            <button class="btn btn-p" onclick="login()">Anmelden</button>
            <p id="msg" style="color:red;"></p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <span>🚜 HofBuch Cloud</span>
            <span id="sync-icon" class="loader">☁️ Sync...</span>
            <button onclick="location.reload()">Logout</button>
        </div>

        <div class="card admin-only">
            <h3>Mitarbeiter anlegen (Admin)</h3>
            <input type="text" id="new-u" placeholder="Name des Erntehelfers">
            <input type="password" id="new-p" placeholder="Passwort">
            <select id="new-r">
                <option value="worker">Erntehelfer / Mitarbeiter</option>
                <option value="admin">Administrator</option>
            </select>
            <button class="btn btn-p" onclick="addUser()">Account erstellen</button>
        </div>

        <div class="card">
            <h3>Aktuelle Aufgaben & Wartungen</h3>
            <div id="task-list">Lade Daten...</div>
            <div class="admin-only">
                <hr>
                <input type="text" id="t-m" placeholder="Maschine">
                <input type="text" id="t-d" placeholder="Aufgabe">
                <button class="btn btn-p" onclick="addTask()">Zuweisen</button>
            </div>
        </div>

        <div class="card">
            <h3>Ersatzteile / Bestellliste</h3>
            <input type="text" id="o-i" placeholder="Was wird benötigt?">
            <button class="btn btn-p" style="background:orange" onclick="addOrder()">Teil anfordern</button>
            <div id="order-list" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        // HIER DEINE ID VON NPOINT EINTRAGEN:
        const BIN_ID = "https://www.npoint.io/docs/ee2e847bca4c396d9025"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let db = { users: [], tasks: [], orders: [], fleet: [] };
        let currentUser = null;

        async function loadDB() {
            document.getElementById('sync-icon').style.display = "inline";
            const res = await fetch(API_URL);
            db = await res.json();
            document.getElementById('sync-icon').style.display = "none";
            render();
        }

        async function saveDB() {
            document.getElementById('sync-icon').style.display = "inline";
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(db)
            });
            document.getElementById('sync-icon').style.display = "none";
            render();
        }

        async function login() {
            await loadDB();
            const u = document.getElementById('l-u').value;
            const p = document.getElementById('l-p').value;
            const user = db.users.find(x => x.u === u && x.p === p);
            
            if(user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = "none";
                document.getElementById('app').style.display = "block";
                if(user.r === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(e => e.style.display = "block");
                }
            } else {
                document.getElementById('msg').innerText = "Falsche Zugangsdaten!";
            }
        }

        function addUser() {
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            const r = document.getElementById('new-r').value;
            if(u && p) {
                db.users.push({u, p, r});
                saveDB();
                alert("Mitarbeiter " + u + " kann sich jetzt einloggen!");
            }
        }

        function addTask() {
            const v = document.getElementById('t-m').value;
            const d = document.getElementById('t-d').value;
            if(v && d) { db.tasks.push({v, d}); saveDB(); }
        }

        function addOrder() {
            const i = document.getElementById('o-i').value;
            if(i) { db.orders.push({i, u: currentUser.u}); saveDB(); }
        }

        function render() {
            const tl = document.getElementById('task-list');
            tl.innerHTML = db.tasks.map((t, i) => `
                <div style="border-bottom:1px solid #eee; padding:5px;">
                    <b>${t.v}</b>: ${t.d} 
                    <button onclick="db.tasks.splice(${i},1);saveDB()" style="float:right">✓</button>
                </div>
            `).join('');

            const ol = document.getElementById('order-list');
            ol.innerHTML = db.orders.map((o, i) => `
                <div style="font-size:13px;">• ${o.i} (von ${o.u}) 
                ${currentUser.r === 'admin' ? `<button onclick="db.orders.splice(${i},1);saveDB()">X</button>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
